name: CI – Generate Models & Annotations, Build ORD-Java

on:
  push:
    branches:
      - 'main'

jobs:
  build:
    name: Generate & Build ORD-Java
    runs-on: ubuntu-latest
    steps:

      - name: Checkout ord-maven repo
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js 24
        uses: actions/setup-node@v6.4.0
        with:
          cache: npm
          node-version: 24.17.0
          cache-dependency-path: tools/annotation-gen/package-lock.json

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          java-version: 25
          maven-version: 3.9.14

      - name: Build project
        run: mvn clean install -B -Dgpg.skip=true

      - name: Assert no files changed
        run: |
          if [[ -n "$(git status -s)" ]]; then
            echo "Generated sources are not up to date, please commit any changes."
            exit 1
          fi
        
